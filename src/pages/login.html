<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/css/mdb.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../styles/styles.css">
        <link rel="stylesheet" href="../styles/login.css" />
    </head>
    <body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
        <div class="p-5">
            <div class="row bg-light shadow-lg rounded-3 overflow-hidden align-items-center">
                <!-- The image half -->
                <div class="col-lg-6 d-none d-lg-flex bg-image p-0 align-items-center">
                    <img class="mw-100" src="../img/Image 3 jun 2026, 19_00_09-copy2.png" alt="imagen" />
                </div>

                <!-- The content half -->
                <div class="col-lg-6 p-lg-0">
                    <div class="d-flex align-items-center bg-light align-self-center p-5 p-lg-0">
                        <!-- Demo content-->
                        <div class="container">
                            <div class="">
                                <div class="col-lg-10 mx-auto">
                                    <h3 class="display-4 text-center">Corralon PIPW</h3>
                                    <form>
                                        <p class="text-muted mb-4 text-center">Iniciar Sesión</p>
                                        <div data-mdb-input-init class="form-outline mb-4">
                                            <input type="text" id="form2Example1" class="form-control" />
                                            <label class="form-label" for="form2Example1">Nombre de usuario</label>
                                        </div>

                                        <!-- Password input -->
                                        <div data-mdb-input-init class="form-outline mb-4">
                                            <input type="password" id="form2Example2" class="form-control" />
                                            <label class="form-label" for="form2Example2">Contraseña</label>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-block text-uppercase mb-2 rounded-pill shadow-sm w-50 mx-auto">Ingresar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <!-- End -->
                    </div>
                </div>
                <!-- End -->
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/js/mdb.umd.min.js"></script>
    </body>
</html>
