            </button>
            <div class="navbar-brand fs-4"><i class="bi bi-bricks me-3 text-bg-dark fs-4"></i>Corralon PIPW</div>

                aria-labelledby="offcanvasDarkNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Corralon PIPW</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"

                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link" href="./home.html"><i class="bi bi-bag d-inline d-lg-none me-2"></i>Catalogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="./cart.html"><i class="bi bi-cart d-inline d-lg-none me-2"></i>Carrito <span class="badge bg-secondary" id="cartItemCount">0</span></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="./profile.html"><i class="bi bi-person-circle d-inline d-lg-none me-2"></i>Perfil</a>
                        </li>
                </div>
            </div>
        </div>
    </nav>
    <br><br>

    <!-- cart -->
    <div class="container py-4 mt-5 flex-grow-1" id="cartContainer">

    </div>

    <!-- Modal Confirm purchase -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Confirmar la compra?</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Revisa que todo este bien
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-success" id="confirmPurchaseButton">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal confirm delete -->
    <div class="modal fade" id="trashProductModal" tabindex="-1" aria-labelledby="trashProductModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="trashProductModalLabel">Quieres eliminar este producto?</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex align-items-center">
                    <img src="" alt="" class="" style="height: 200px;">
                    <h3></h3>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

        <footer class="text-center text-lg-start text-bg-dark">

                    <a href="https://github.com/ITAlonsoRabanal" class="text-reset text-decoration-none">github.com/ITAlonsoRabanal</a>
