<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Users Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/css/mdb.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../../styles/styles.css" />
    </head>
    <body>
        <div class="d-flex align-items-center mx-0" style="height: 100vh">
            <div class="row align-items-start m-2 w-100">
                <div class="card col-lg-3 me-5 shadow">
                    <div class="card-body">
                        <form>
                            <caption class="text-center mb-4">
                                Crear Usuario
                            </caption>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="text" id="inputName" class="form-control" />
                                <label class="form-label" for="inputName">Nombre</label>
                            </div>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="text" id="inputLastName" class="form-control" />
                                <label class="form-label" for="inputLastName">Apellido</label>
                            </div>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="text" id="inputUserName" class="form-control" />
                                <label class="form-label" for="inputUserName">Nombre de usuario</label>
                            </div>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="password" id="inputPassword" class="form-control">
                                <label class="form-label" for="inputPassword">Contraseña</label>
                            </div>
                            <button type="submit" class="btn btn-success">Crear</button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-8 p-3 rounded shadow">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th scope="col">Nombre de usuario</th>
                                <th scope="col">Contraseña</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Apellido</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">User1</th>
                                <td>********</td>
                                <td>John</td>
                                <td>Doe</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger">Deshabilitar</button>
                                </td>
                            </tr>
                            <tr>
                                <th scope="row">User2</th>
                                <td>********</td>
                                <td>Jane</td>
                                <td>Smith</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger">Deshabilitar</button>
                                </td>
                            </tr>
                            <tr>
                                <th scope="row">User3</th>
                                <td>********</td>
                                <td>Bob</td>
                                <td>Johnson</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger">Deshabilitar</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/js/mdb.umd.min.js"></script>
    </body>
</html>
