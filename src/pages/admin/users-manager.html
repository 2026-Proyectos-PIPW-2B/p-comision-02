<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/css/mdb.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="../../styles/styles.css" />
    </head>
    <body>
        <!-- navbar -->
        <nav class="navbar navbar-dark navbar-expand-lg bg-dark fixed-top">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand fs-4" href="#"><i class="bi bi-bricks me-3 text-bg-dark fs-4"></i>Panel Administrador</a>
                <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar"
                    aria-labelledby="offcanvasDarkNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Panel Administrador</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                            aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link" href="products-manager.html">Productos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="categories-manager.html">Categorías</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="users-manager.html">Usuarios</a>
                            </li>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Formulario y tabla de usuarios -->
        <div class="d-flex align-items-center mx-0" style="height: 100vh">
            <div class="row align-items-start m-2 w-100">
                <div class="card col-lg-3 me-5 shadow">
                    <div class="card-body">
                        <form>
                            <caption class="text-center mb-4">
                                Crear Usuario
                            </caption>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="text" id="inputName" class="form-control" />
                                <label class="form-label" for="inputName">Nombre</label>
                            </div>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="text" id="inputLastName" class="form-control" />
                                <label class="form-label" for="inputLastName">Apellido</label>
                            </div>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="text" id="inputUserName" class="form-control" />
                                <label class="form-label" for="inputUserName">Nombre de usuario</label>
                            </div>
                            <div data-mdb-input-init class="form-outline mb-3">
                                <input type="password" id="inputPassword" class="form-control">
                                <label class="form-label" for="inputPassword">Contraseña</label>
                            </div>
                            <button type="submit" class="btn btn-success">Crear</button>
                        </form>
                    </div>
                </div>
                <div class="col-lg-8 p-3 rounded shadow">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th scope="col">Nombre de usuario</th>
                                <th scope="col">Contraseña</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Apellido</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th scope="row">User1</th>
                                <td>********</td>
                                <td>John</td>
                                <td>Doe</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger">Deshabilitar</button>
                                </td>
                            </tr>
                            <tr>
                                <th scope="row">User2</th>
                                <td>********</td>
                                <td>Jane</td>
                                <td>Smith</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger">Deshabilitar</button>
                                </td>
                            </tr>
                            <tr>
                                <th scope="row">User3</th>
                                <td>********</td>
                                <td>Bob</td>
                                <td>Johnson</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary">Editar</button>
                                    <button class="btn btn-sm btn-outline-danger">Deshabilitar</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/mdb-ui-kit@9.3.0/js/mdb.umd.min.js"></script>
    </body>
</html>
