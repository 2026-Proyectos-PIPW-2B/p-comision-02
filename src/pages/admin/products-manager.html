<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Products Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link rel="stylesheet" href="floating-labels.css" />
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#"> Tech Future Summit </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="#inicio">Inicio</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#speakers">Speakers</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#agenda">Agenda</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#registro">Registro</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#footer">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="container d-flex justify-content-start align-items-center" style="height: 100vh">
            <div class="card" style="width: 18rem">
                <div class="card-body">
                    <form>
                        <caption>
                            Crear Producto
                        </caption>
                        <div class="mb-3 form-label-group outline">
                            <input type="text" id="tt2" class="form-control" placeholder="Nombre" />
                            <span><label for="tt2">Nombre</label></span>
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputStock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="exampleInputStock" />
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPrecio" class="form-label">Precio</label>
                            <input type="number" class="form-control" id="exampleInputPrecio" />
                        </div>
                        <div class="mb-3">
                            <select name="categoria" id="selectCategoria">
                                <option value="" disabled selected>Seleccione una categoría</option>
                                <option value="1">Categoria 1</option>
                                <option value="2">Categoria 2</option>
                                <option value="3">Categoria 3</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <select name="imagen" id="selectImagen">
                                <option value="" disabled selected>Seleccione una imagen</option>
                                <option value="1">Imagen 1</option>
                                <option value="2">Imagen 2</option>
                                <option value="3">Imagen 3</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Crear</button>
                    </form>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
