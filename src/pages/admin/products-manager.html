<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Products Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
        <link rel="stylesheet" href="../../styles/categories-manager.css" />
    </head>
    <body>

        <!-- navbar -->
        <nav class="navbar navbar-dark navbar-expand-lg bg-dark fixed-top">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <a class="navbar-brand fs-4" href="#"><i class="bi bi-bricks me-3 text-bg-dark fs-4"></i>Panel Administrador</a>
                <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar"
                    aria-labelledby="offcanvasDarkNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Panel Administrador</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                            aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="products-manager.html">Productos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link " href="categories-manager.html">Categorías</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link " href="users-manager.html">Usuarios</a>
                            </li>
                    </div>
                </div>
            </div>
        </nav>
        <br><br>

        <!-- Formulario y tabla de productos -->
        <div class="d-flex align-items-center justify-content-center my-5">
            <div class="row align-items-start justify-content-center w-100 gap-5">
                <div class="card col-lg-3  shadow sticky-top" style="top: 100px;">
                    <div class="card-body">
                        <form class="needs-validation" novalidate>
                            <h5 class=" mb-3">
                                Crear Producto
                            </h5>
                            <div class="form-floating mb-3">
                                <input type="text" id="inputName" class="form-control" placeholder="Nombre" required/>
                                <label class="form-label" for="inputName">Nombre</label>
                                <div class="invalid-feedback" id="nameError"></div>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="number" id="inputPrice" class="form-control" placeholder="Precio" required/>
                                <label class="form-label" for="inputPrice">Precio</label>
                                <div class="invalid-feedback" id="priceError"></div>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="number" id="inputStock" class="form-control" placeholder="Stock" required/>
                                <label class="form-label" for="inputStock">Stock</label>
                                <div class="invalid-feedback" id="stockError"></div>
                            </div>
                            <div class="mb-3">
                                <select class="form-select" name="categories" id="selectCategories" required>
                                    <option value="" disabled selected>Seleccione una categoría</option>
                                </select>
                                <div class="invalid-feedback" id="categoryError"></div>
                            </div>
                            <div class="mb-3">
                                <select class="form-select" name="imagen" id="selectImage" required>
                                    <option value="" disabled selected>Seleccione una imagen</option>
                                    <option value="./../../img/products/cable_galvanizado.jpg">Imagen 1</option>
                                    <option value="./../../img/products/cemento.jpg">Imagen 2</option>
                                    <option value="./../../img/products/cetol.jpg">Imagen 3</option>
                                    <option value="./../../img/products/ladrilo.jpg">Imagen 4</option>
                                </select>
                                <div class="invalid-feedback" id="imageError"></div>
                            </div>
                            <button class="btn btn-success" id="submitProductButton">Crear</button>
                            <div class="d-flex justify-content-end gap-2 mt-3 d-none" id="updateCancelButtons">
                                <button class="btn btn-success" id="updateProductButton">Actualizar</button>
                                <button class="btn btn-danger" id="cancelProductButton">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="col-lg-8 p-3 rounded shadow bg-white">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th scope="col">Nombre</th>
                                <th scope="col">Precio</th>
                                <th scope="col">Stock</th>
                                <th scope="col">Categoría</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyProducts">
                        </tbody>
                    </table>
                    <nav aria-label="Page navigation example">
                        <ul class="pagination">
                            <li class="page-item">
                                <a class="page-link" href="#" aria-label="Previous" id="previousPage">
                                    <span aria-hidden="true">&laquo;</span>
                                </a>
                            </li>
                            <li class="page-item">
                                <a class="page-link" href="#" aria-label="Next" id="nextPage">
                                    <span aria-hidden="true">&raquo;</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div class="modal fade" id="visualizerModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Visualizador de imágen</h1>
                    </div>
                    <div class="modal-body" id="visualizerModal-body">
                        <!-- modal body generado con js -->
                    </div>
                    <div class="modal-footer">
                        <!-- modal footer generado con js -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal confirm delete -->
        <div class="modal fade" id="trashModal" tabindex="-1" aria-labelledby="trashModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="trashModalLabel"></h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body d-flex align-items-center">
                        <h3></h3>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="https://unpkg.com/validator@latest/validator.min.js"></script>
        <script type="module" src="../../js/products-manager.js"></script>
        <script type="module" src="../../js/common/global.js"></script>
    </body>
</html>
