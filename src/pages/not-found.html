<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .error-card {
            max-width: 600px;
            border-radius: 1rem;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <div class="container d-flex flex-grow-1 justify-content-center align-items-center">
        <div class="card shadow-lg error-card w-100 border-0">
            <div class="card-body text-center p-5">

                <h1 class="error-code text-danger"><i class="bi bi-folder-x display-1 text-danger"></i></h1>

                <h2 class="fw-bold mt-3">
                    Página no encontrada
                </h2>

                <p class="text-secondary mt-3 mb-4">
                    La página que intentas visitar no existe o no tienes acceso.
                </p>

                <div class="d-flex justify-content-center gap-2">
                    <a href="./login.html" class="btn btn-primary">
                        Ir al login
                    </a>

                    <button
                        class="btn btn-outline-secondary"
                        onclick="history.back()">
                        Volver
                    </button>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
