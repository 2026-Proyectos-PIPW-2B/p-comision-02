<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous" />
			<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
		<link rel="stylesheet" href="../styles/styles.css" />
	</head>
	<body>
		<nav class="navbar navbar-dark navbar-expand-lg bg-dark fixed-top">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <a class="navbar-brand fs-4" href="#"><i class="bi bi-bricks me-3 text-bg-dark fs-4"></i>Corralon PIPW</a>
            <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar"
                aria-labelledby="offcanvasDarkNavbarLabel">
                <div class="offcanvas-header">
                    <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">Corralon PIPW</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"
                        aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                        <li class="nav-item">
                            <a class="nav-link " href="./home.html">Catalogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./cart.html">Carrito</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="./profile.html">Perfil</a>
                        </li>
                </div>
            </div>
        </div>
    </nav>
	<br><br>
		<main class="container-fluid pt-5">
			<div class="row p-3">
				<!-- Sidebar -->
				<aside class="col-lg-3 col-xl-2 mb-4">
					<div class="card border-0 shadow-lg sticky-top" style="top: 90px;">
						<div class="card-body text-center">
							<div class="position-relative d-inline-block">
								<img
									src="../img/blank-profile-picture-973460_960_720.png"
									alt="Perfil"
									class="rounded-circle border"
									width="120"
									height="120" />

								<button
									class="btn btn-primary btn-sm rounded-circle position-absolute bottom-0 end-0">
									<i class="bi bi-pencil"></i>
								</button>
							</div>

							<h4 class="mt-3 mb-1" id="userName">
								Ignacio Alonso
							</h4>

							<p class="text-secondary">Usuario</p>

							<hr />

							<button
								class="btn btn-outline-danger w-100"
								id="logoutButton">
								<i class="bi bi-box-arrow-right me-2"></i>
								Cerrar sesión
							</button>
						</div>
					</div>
				</aside>

				<!-- Historial -->
				<section class="col-lg-9 col-xl-10">
					<div class="card border-0 shadow-lg">
						<div class="card-body p-4">
							<h3 class="mb-4">Historial de compras</h3>

							<table class="table table-responsive table-hover">
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Productos</th>
                                <th scope="col">Monto total</th>
                                <th scope="col">Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyCategories">
                        </tbody>
                    </table>
						</div>
					</div>
				</section>
			</div>
		</main>
	</body>
</html>
